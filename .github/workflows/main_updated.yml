name: Post household thread to Bluesky NEW

on:
  schedule:
    - cron: "40 * * * *"
  workflow_dispatch:

env:
  CSV_FILE: posts_04062026.csv

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install atproto

      - name: Run household thread bot
        env:
          CSV_FILE: ${{ env.CSV_FILE }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python post_household_thread.py

      - name: Commit updated queue
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add "$CSV_FILE"
          git diff --cached --quiet || git commit -m "Update household posting queue"
          git push
